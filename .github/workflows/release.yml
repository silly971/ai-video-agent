name: GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build native Windows desktop
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          powershell -ExecutionPolicy Bypass -File scripts\build-native-desktop.ps1 -Version $version -RunSmokeTest

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/AI-Video-Agent-Native-*-Windows-x64.exe
            release/AI-Video-Agent-Native-*-Windows-x64.zip
            release/AI-Video-Agent-Native-*-Windows-x64.zip.sha256
          generate_release_notes: true
